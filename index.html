      };

      const handleSignOut = async () => {
        try {
          await window._signOut();
        } catch (e) {
          console.error("Sign out error:", e);
          // Force clear state even if Firebase errors
          setUser(null);
          setProjects([]);
          setActiveProjectId(null);
        }
      };

      if (user === undefined) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: T.bg }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ width: 48, height: 48, borderRadius: 12, background: T.navy, display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 20, color: "#fff", fontWeight: 700, fontFamily: "'Inter', sans-serif", marginBottom: 16 }}>BS</div>
              <div style={{ color: T.muted, fontSize: 13 }}>Loading…</div>
            </div>
          </div>
        );
      }

      if (!user) return <AuthScreen />;

      return (
        <div>
          {showConflict && <ConflictCheck projects={projects} onClose={() => setShowConflict(false)} />}

          {/* Top nav */}
          <div className="no-print" style={{ borderBottom: `1px solid ${T.border}`, padding: "0 32px", display: "flex", alignItems: "center", gap: 12, height: 54, background: "#fff", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <button onClick={() => setActiveProjectId(null)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 9, padding: 0 }}>
              <div style={{ width: 28, height: 28, borderRadius: 6, background: T.navy, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#fff", fontWeight: 700, fontFamily: "'Inter', sans-serif", letterSpacing: "-0.02em" }}>BS</div>
              <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 15, color: T.navy, fontWeight: 700, letterSpacing: "-0.02em" }}>BuySight</span>
            </button>
            <span style={{ color: T.border, fontSize: 16, margin: "0 2px" }}>|</span>
            {/* Nav tools */}
            <button onClick={() => { setActiveProjectId(null); }}
              style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, fontFamily: "'Inter', sans-serif", fontWeight: 500, color: !activeProject && !showConflict ? T.navy : T.muted, padding: "4px 8px", borderRadius: 6, transition: "color 0.13s" }}>
              Projects
            </button>
            <button onClick={() => { setShowConflict(true); }}
              style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: `1px solid ${T.border}`, cursor: "pointer", fontSize: 12, fontFamily: "'Inter', sans-serif", fontWeight: 500, color: T.muted, padding: "4px 12px", borderRadius: 6, transition: "all 0.13s" }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.navy; e.currentTarget.style.color = T.navy; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.color = T.muted; }}>
              ⚡ Conflict Check
            </button>
            {activeProject && (
              <React.Fragment>
                <span style={{ color: T.mutedLight, margin: "0 2px" }}>›</span>
                <span style={{ color: T.textSecondary, fontSize: 13, fontWeight: 500 }}>{activeProject.name}</span>
                {(activeProject.tags || []).length > 0 && (
                  <div style={{ display: "flex", gap: 4 }}>
                    {(activeProject.tags || []).map((t) => <TagChip key={t} tag={t} allTags={allTags} style={{ fontSize: 10, padding: "1px 7px" }} />)}
                  </div>
                )}
              </React.Fragment>
            )}
            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 16 }}>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: T.mutedLight }}>{projects.length} project{projects.length !== 1 ? "s" : ""}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: T.accentBg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: T.blue, fontWeight: 700, flexShrink: 0 }}>
                  {(user.displayName || user.email || "?")[0].toUpperCase()}
                </div>
                <span style={{ fontSize: 12, color: T.muted, maxWidth: 160, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {user.displayName || user.email}
                </span>
                <button onClick={handleSignOut}
                  style={{ background: "none", border: `1px solid ${T.border}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 12, color: T.muted, fontFamily: "'Inter', sans-serif", fontWeight: 500, transition: "all 0.13s" }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = T.danger; e.currentTarget.style.color = T.danger; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = T.border; e.currentTarget.style.color = T.muted; }}>
                  Sign out
                </button>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 1080, margin: "0 auto", padding: "40px 32px" }}>
            {!activeProject
              ? <ProjectsHome projects={projects} onSelect={setActiveProjectId} onCreate={createProject} allTags={allTags} />
              : <ProjectDetail project={activeProject} onUpdate={updateProject} onBack={() => setActiveProjectId(null)} allTags={allTags} />
            }
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
